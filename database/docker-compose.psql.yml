services:
  postgres:
    image: postgres:18
    container_name: booking-postgres
    environment:
      POSTGRES_DB: booking_system
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
    ports:
      - "5434:5432"
    volumes:
      - booking_pg_data:/var/lib/postgresql


volumes:
  booking_pg_data: