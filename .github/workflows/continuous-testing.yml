name: Continuous Testing

on:
  push:
    branches:
      - main
      - unit-integration-test
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run unit and integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: booking_system
          POSTGRES_USER: booking_user
          POSTGRES_PASSWORD: booking_pass
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U booking_user -d booking_system"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: localhost
      DB_PORT: 5434
      DB_NAME: booking_system
      DB_USER: booking_user
      DB_PASSWORD: booking_pass
      WEATHER_API_KEY: dummy-key-for-ci
      WEATHER_API_BASE_URL: https://api.weatherapi.com/v1
      WEATHER_API_LOCATION: copenhagen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run unit and integration tests
        run: ./mvnw test -Dtest='BookingValidatorTest,BookingServiceTest,WeatherClientIntegrationTest,BookingRepositoryIntegrationTest,BookingControllerIntegrationTest'
