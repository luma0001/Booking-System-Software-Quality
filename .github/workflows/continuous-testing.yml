name: Continuous Testing

on:
  push:
    branches:
      - main
      - unit-integration-test
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run unit and integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: booking_system
          POSTGRES_USER: booking_user
          POSTGRES_PASSWORD: booking_pass
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U booking_user -d booking_system"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: localhost
      DB_PORT: 5434
      DB_NAME: booking_system
      DB_USER: booking_user
      DB_PASSWORD: booking_pass
      WEATHER_API_KEY: dummy-key-for-ci
      WEATHER_API_BASE_URL: https://api.weatherapi.com/v1
      WEATHER_API_LOCATION: copenhagen

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run all unit and integration tests with coverage check
        run: ./mvnw -B verify

      - name: Start Spring Boot Application
        run: ./mvnw spring-boot:start -Dspring-boot.run.profiles=test

      - name: Wait for Spring Boot Application to be ready
        run: |
          until curl -s http://localhost:8080/actuator/health | grep '"status":"UP"'; do
            echo "Waiting for application to be ready..."
            sleep 5
          done

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright@1.60.0 install --with-deps

      - name: Run Playwright API tests
        run: npm test

      - name: Stop Spring Boot Application
        if: always()
        run: ./mvnw spring-boot:stop
