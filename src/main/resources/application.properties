spring.application.name=booking-system
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5434}/${DB_NAME:booking_system}
spring.datasource.username=${DB_USER:booking_user}
spring.datasource.password=${DB_PASSWORD:booking_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true